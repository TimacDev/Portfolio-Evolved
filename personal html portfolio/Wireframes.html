<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Portfolio Wireframes — Tiago Machado</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Kalam:wght@300;400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #1a1a1a;
    --ink-2: #3a3a3a;
    --ink-3: #777;
    --paper: #f6f1e7;       /* sand-paper */
    --paper-2: #efe7d4;
    --ocean: #2b6a8a;       /* muted ocean blue */
    --ocean-soft: #9ec2d4;
    --sun: #d98a3d;         /* warm sun/terracotta nod */
    --line: #1a1a1a;
    --hatch: rgba(26,26,26,.08);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Kalam", sans-serif;
    color: var(--ink);
    background: var(--paper);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(0,0,0,.04) 0 1px, transparent 2px),
      radial-gradient(circle at 70% 40%, rgba(0,0,0,.03) 0 1px, transparent 2px),
      radial-gradient(circle at 40% 80%, rgba(0,0,0,.04) 0 1px, transparent 2px);
    background-size: 180px 180px, 220px 220px, 260px 260px;
  }
  .hand   { font-family: "Caveat", cursive; }
  .scribble { font-family: "Kalam", sans-serif; }
  .mono   { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: .02em; }

  /* ---------- App shell ---------- */
  .app {
    max-width: 1380px;
    margin: 0 auto;
    padding: 28px 32px 80px;
  }
  .app-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 14px;
    margin-bottom: 20px;
  }
  .app-title {
    font-family: "Caveat", cursive;
    font-size: 42px;
    font-weight: 700;
    line-height: 1;
  }
  .app-title small {
    display: block;
    font-family: "Kalam", sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--ink-3);
    margin-top: 6px;
  }
  .app-meta { text-align: right; }
  .app-meta .stamp {
    display: inline-block;
    border: 1.5px dashed var(--ink);
    padding: 4px 10px;
    transform: rotate(-1.5deg);
    font-family: "Caveat", cursive;
    font-size: 20px;
  }
  .app-meta .legend {
    margin-top: 8px;
    display: flex;
    gap: 14px;
    justify-content: flex-end;
    color: var(--ink-3);
  }
  .app-meta .legend span::before {
    content: "●";
    margin-right: 4px;
  }
  .legend .l-ink::before { color: var(--ink); }
  .legend .l-ocean::before { color: var(--ocean); }
  .legend .l-sun::before { color: var(--sun); }

  /* ---------- Tabs ---------- */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    border-bottom: 2px solid var(--ink);
    margin-bottom: 28px;
  }
  .tab {
    position: relative;
    appearance: none;
    background: transparent;
    border: 2px solid var(--ink);
    border-bottom: none;
    border-top-left-radius: 14px 20px;
    border-top-right-radius: 14px 20px;
    padding: 10px 18px 12px;
    margin: 0 -2px -2px 0;
    font-family: "Caveat", cursive;
    font-size: 22px;
    cursor: pointer;
    color: var(--ink);
    background: var(--paper-2);
    transform: translateY(2px);
    transition: transform .15s ease, background .15s ease;
  }
  .tab:hover { transform: translateY(0); }
  .tab[aria-selected="true"] {
    background: var(--paper);
    transform: translateY(2px);
    box-shadow: 0 2px 0 0 var(--paper);
  }
  .tab .num {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    color: var(--ink-3);
    display: block;
    line-height: 1;
    margin-bottom: 2px;
  }

  .wire { display: none; }
  .wire.active { display: block; }

  /* ---------- Wire canvas ---------- */
  .canvas {
    position: relative;
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 6px;
    padding: 28px;
    box-shadow: 6px 6px 0 0 rgba(26,26,26,.08);
  }
  .canvas::before {
    /* torn-edge / notebook vibe */
    content: "";
    position: absolute; inset: 6px;
    border: 1px dashed rgba(26,26,26,.15);
    border-radius: 4px;
    pointer-events: none;
  }
  .wire-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .wire-head h2 {
    font-family: "Caveat", cursive;
    font-size: 34px;
    margin: 0;
    line-height: 1;
  }
  .wire-head .tagline {
    color: var(--ink-3);
    font-size: 14px;
    max-width: 560px;
  }

  /* ---------- Sketch primitives ---------- */
  .box {
    position: relative;
    border: 2px solid var(--ink);
    border-radius: 4px;
    background: var(--paper);
    padding: 10px 12px;
    min-height: 44px;
  }
  .box.hatch {
    background-image: repeating-linear-gradient(45deg, var(--hatch) 0 2px, transparent 2px 10px);
  }
  .box.dashed { border-style: dashed; }
  .box.ocean  { background: var(--ocean-soft); border-color: var(--ocean); }
  .box.sun    { background: #f5d7b3; border-color: var(--sun); }
  .box.dark   { background: var(--ink); color: var(--paper); }
  .box .lbl {
    position: absolute;
    top: -9px; left: 10px;
    background: var(--paper);
    padding: 0 6px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .box.ocean .lbl, .box.sun .lbl { background: inherit; color: #1a1a1a; }
  .box.dark .lbl { background: var(--ink); color: var(--paper-2); }

  .img-ph {
    position: relative;
    border: 2px solid var(--ink);
    border-radius: 4px;
    background:
      linear-gradient(135deg, transparent 48%, var(--ink) 49%, var(--ink) 51%, transparent 52%) 0 0/24px 24px,
      linear-gradient(45deg,  transparent 48%, var(--ink) 49%, var(--ink) 51%, transparent 52%) 0 0/24px 24px,
      var(--paper-2);
    background-blend-mode: multiply;
    opacity: .85;
    overflow: hidden;
  }
  .img-ph .label {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    background: rgba(246,241,231,.85);
    padding: 4px 8px;
    margin: auto;
    height: fit-content; width: fit-content;
    border: 1px solid var(--ink);
  }

  .hero-photo {
    position: relative;
    border: 2px solid var(--ink);
    border-radius: 4px;
    overflow: hidden;
    background: #2b6a8a url("assets/baleal_drone.jpg") center/cover;
    color: #fff;
  }
  .hero-photo::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,.35), rgba(0,0,0,.05) 40%, rgba(0,0,0,.45));
  }
  .hero-photo > * { position: relative; z-index: 1; }
  .hero-photo .tag {
    position: absolute; top: 10px; left: 10px; z-index: 2;
    background: var(--paper);
    color: var(--ink);
    border: 1.5px solid var(--ink);
    padding: 2px 8px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
  }

  .btn {
    display: inline-block;
    border: 2px solid var(--ink);
    background: var(--paper);
    padding: 6px 14px;
    font-family: "Caveat", cursive;
    font-size: 20px;
    border-radius: 999px;
    line-height: 1;
  }
  .btn.solid { background: var(--ink); color: var(--paper); }
  .btn.ocean { background: var(--ocean); color: #fff; border-color: var(--ocean); }
  .btn.sm { font-size: 16px; padding: 4px 10px; }

  .chip {
    display: inline-block;
    border: 1.5px solid var(--ink);
    border-radius: 999px;
    padding: 2px 10px;
    font-family: "Kalam", sans-serif;
    font-size: 13px;
    background: var(--paper);
  }
  .chip.ocean { background: var(--ocean-soft); }
  .chip.sun { background: #f5d7b3; }

  .line { height: 2px; background: var(--ink); border-radius: 2px; }
  .line.thin { height: 1px; background: var(--ink-3); }
  .line.dashed { background: transparent; border-top: 2px dashed var(--ink); }

  /* text "lines" placeholders */
  .lorem { display: flex; flex-direction: column; gap: 6px; }
  .lorem span {
    height: 8px;
    background: var(--ink-3);
    opacity: .5;
    border-radius: 2px;
  }
  .lorem span:nth-child(1) { width: 92%; }
  .lorem span:nth-child(2) { width: 78%; }
  .lorem span:nth-child(3) { width: 88%; }
  .lorem span:nth-child(4) { width: 60%; }
  .lorem.tight span { height: 6px; }

  .eyebrow {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--ink-3);
  }

  /* Annotation callouts */
  .note {
    position: relative;
    font-family: "Caveat", cursive;
    font-size: 20px;
    color: var(--ocean);
    line-height: 1.1;
  }
  .note::before {
    content: "";
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--ocean);
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: -3px;
  }
  .arrow {
    font-family: "Caveat", cursive;
    font-size: 22px;
    color: var(--ocean);
  }
  .callout {
    border: 2px dashed var(--ocean);
    background: rgba(158,194,212,.25);
    border-radius: 10px;
    padding: 8px 12px;
    font-family: "Caveat", cursive;
    font-size: 19px;
    color: var(--ocean);
    line-height: 1.15;
    max-width: 260px;
  }

  /* Wave dividers */
  .wave {
    display: block;
    width: 100%;
    height: 28px;
    color: var(--ocean);
  }

  /* ---------- Per-wireframe grids ---------- */
  .grid { display: grid; gap: 14px; }

  /* Wire 1: Classic Plus */
  .w1-hero { display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; }
  .w1-hero .hero-photo { height: 300px; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; }
  .w1-intro { display: grid; grid-template-columns: 110px 1fr; gap: 14px; align-items: start; }
  .w1-skills { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .w1-projects { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .w1-project { display: flex; flex-direction: column; gap: 8px; }
  .w1-project .img-ph { aspect-ratio: 4/3; }
  .w1-tl { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; position: relative; padding-top: 20px; }
  .w1-tl::before {
    content: ""; position: absolute; left: 0; right: 0; top: 12px;
    border-top: 2px dashed var(--ink);
  }
  .w1-tl .node { text-align: center; position: relative; }
  .w1-tl .node::before {
    content: ""; width: 14px; height: 14px; border: 2px solid var(--ink);
    background: var(--paper); border-radius: 50%;
    position: absolute; left: 50%; top: -26px; transform: translateX(-50%);
  }

  /* Wire 2: Sticky coastline */
  .w2 { display: grid; grid-template-columns: 180px 1fr; gap: 20px; }
  .w2-nav {
    position: sticky; top: 20px;
    border: 2px solid var(--ink);
    background: var(--paper-2);
    border-radius: 14px;
    padding: 14px 10px;
    height: fit-content;
  }
  .w2-nav .coast {
    position: relative;
    border-left: 3px solid var(--ocean);
    padding-left: 14px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .w2-nav .dot {
    position: relative;
    font-family: "Caveat", cursive;
    font-size: 18px;
  }
  .w2-nav .dot::before {
    content: ""; width: 12px; height: 12px; border-radius: 50%;
    background: var(--paper); border: 2px solid var(--ocean);
    position: absolute; left: -21px; top: 4px;
  }
  .w2-nav .dot.active::before { background: var(--sun); border-color: var(--sun); }
  .w2-nav .waterline {
    position: absolute; left: 0; top: 0; bottom: 60%;
    width: 3px; background: var(--ocean);
  }
  .w2-main { display: flex; flex-direction: column; gap: 22px; }

  /* Wire 3: Multi-route */
  .w3-frame {
    border: 2px solid var(--ink);
    border-radius: 10px;
    padding: 12px;
    background: var(--paper-2);
  }
  .w3-topnav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 10px;
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 999px;
    margin-bottom: 12px;
  }
  .w3-routes {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    margin-top: 14px;
  }
  .w3-route {
    border: 2px dashed var(--ink);
    border-radius: 6px;
    padding: 8px;
    background: var(--paper);
    min-height: 210px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .w3-route .tab-label {
    display: flex; justify-content: space-between; align-items: baseline;
  }

  /* Wire 4: Bento */
  .w4-bento {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-auto-rows: 90px;
    gap: 10px;
  }
  .w4-bento > * { border-radius: 8px; }
  .b-hero { grid-column: span 4; grid-row: span 3; }
  .b-intro { grid-column: span 2; grid-row: span 2; }
  .b-skills { grid-column: span 2; grid-row: span 1; }
  .b-proj-1 { grid-column: span 2; grid-row: span 2; }
  .b-proj-2 { grid-column: span 2; grid-row: span 2; }
  .b-proj-3 { grid-column: span 2; grid-row: span 2; }
  .b-timeline { grid-column: span 4; grid-row: span 2; }
  .b-contact { grid-column: span 2; grid-row: span 2; }
  .b-map { grid-column: span 3; grid-row: span 2; }
  .b-quote { grid-column: span 3; grid-row: span 2; }

  /* Wire 5: Scroll Journey */
  .w5-frame {
    border: 2px solid var(--ink);
    border-radius: 10px;
    background: var(--paper-2);
    padding: 10px;
    overflow: hidden;
  }
  .w5-track {
    position: relative;
    display: grid;
    grid-template-columns: repeat(5, minmax(220px, 1fr));
    gap: 14px;
    padding: 24px 10px 50px;
  }
  .w5-track::before {
    content: "";
    position: absolute;
    left: 20px; right: 20px; bottom: 30px;
    height: 2px;
    background-image: linear-gradient(to right, var(--ink) 50%, transparent 0);
    background-size: 10px 2px;
    background-repeat: repeat-x;
  }
  .w5-stop {
    border: 2px solid var(--ink);
    border-radius: 6px;
    background: var(--paper);
    padding: 10px;
    display: flex; flex-direction: column; gap: 6px;
    position: relative;
  }
  .w5-stop::after {
    content: "";
    position: absolute; bottom: -24px; left: 50%; transform: translateX(-50%);
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--sun); border: 2px solid var(--ink);
  }
  .w5-scrollbar {
    display: flex; align-items: center; gap: 8px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px; color: var(--ink-3);
    margin-top: 6px;
  }
  .w5-scrollbar .track {
    flex: 1; height: 6px; border: 1.5px solid var(--ink); border-radius: 999px; position: relative;
  }
  .w5-scrollbar .thumb {
    position: absolute; left: 20%; width: 30%; top: -2px; bottom: -2px;
    background: var(--ocean); border: 1.5px solid var(--ink); border-radius: 999px;
  }

  /* Wire 6: Minimalist surf */
  .w6 { display: grid; grid-template-columns: 1fr; gap: 24px; }
  .w6-masthead {
    display: grid; grid-template-columns: 1fr auto; align-items: end;
    gap: 20px;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 14px;
  }
  .w6-masthead h3 {
    font-family: "Caveat", cursive;
    font-size: 56px; margin: 0; line-height: .9;
  }
  .w6-cols { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
  .w6-article { display: flex; flex-direction: column; gap: 10px; }
  .w6-dropcap {
    float: left; font-family: "Caveat", cursive; font-size: 62px; line-height: .8;
    padding: 6px 10px 0 0;
  }
  .w6-case {
    border-top: 2px solid var(--ink);
    padding-top: 14px;
    display: grid; grid-template-columns: 80px 1fr auto; gap: 14px;
    align-items: center;
    cursor: pointer;
  }
  .w6-case .num { font-family: "Caveat", cursive; font-size: 40px; }

  /* Footer beneath each wire */
  .wire-foot {
    margin-top: 18px;
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px;
    font-family: "Kalam", sans-serif; font-size: 13px;
  }
  .wire-foot .card {
    border: 1.5px dashed var(--ink);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .wire-foot .card h4 {
    font-family: "Caveat", cursive;
    font-size: 22px;
    margin: 0 0 4px;
    line-height: 1;
  }

  /* Tweaks panel */
  .tweaks {
    position: fixed;
    bottom: 18px; right: 18px;
    z-index: 50;
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 14px;
    padding: 12px 14px;
    box-shadow: 4px 4px 0 0 rgba(26,26,26,.15);
    display: none;
    min-width: 240px;
  }
  .tweaks.open { display: block; }
  .tweaks h5 {
    margin: 0 0 8px;
    font-family: "Caveat", cursive;
    font-size: 22px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .tweaks label {
    display: flex; flex-direction: column; gap: 4px;
    margin-bottom: 10px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .tweaks select, .tweaks input[type="range"] {
    font-family: "Kalam", sans-serif;
    font-size: 14px;
    border: 1.5px solid var(--ink);
    background: var(--paper);
    border-radius: 6px;
    padding: 4px 6px;
  }
  .tweaks .row { display: flex; gap: 8px; align-items: center; }
  .tweaks .row .btn { cursor: pointer; }

  /* Language chip */
  .lang-toggle {
    display: inline-flex;
    border: 1.5px solid var(--ink);
    border-radius: 999px;
    overflow: hidden;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
  }
  .lang-toggle span {
    padding: 2px 8px;
  }
  .lang-toggle .on {
    background: var(--ink); color: var(--paper);
  }

  @media (max-width: 900px) {
    .w2 { grid-template-columns: 1fr; }
    .w1-hero, .w1-intro, .w6-cols { grid-template-columns: 1fr; }
    .w1-skills, .w1-projects, .w1-tl, .w3-routes { grid-template-columns: repeat(2, 1fr) !important; }
    .w4-bento { grid-template-columns: repeat(2, 1fr); }
    .w4-bento > * { grid-column: span 2 !important; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- ============ HEADER ============ -->
  <div class="app-header">
    <div>
      <div class="app-title">
        Portfolio Wireframes
        <small>Tiago Machado · upgrade exploration · 6 directions · beach theme preserved</small>
      </div>
    </div>
    <div class="app-meta">
      <div class="stamp">low-fi · not final</div>
      <div class="legend mono">
        <span class="l-ink">structure</span>
        <span class="l-ocean">annotation</span>
        <span class="l-sun">highlight</span>
      </div>
    </div>
  </div>

  <!-- ============ TABS ============ -->
  <div class="tabs" role="tablist">
    <button class="tab" role="tab" aria-selected="true"  data-wire="w1"><span class="num">01</span>Classic Plus</button>
    <button class="tab" role="tab" aria-selected="false" data-wire="w2"><span class="num">02</span>Sticky Coastline</button>
    <button class="tab" role="tab" aria-selected="false" data-wire="w3"><span class="num">03</span>Multi-route SPA</button>
    <button class="tab" role="tab" aria-selected="false" data-wire="w4"><span class="num">04</span>Bento Beach</button>
    <button class="tab" role="tab" aria-selected="false" data-wire="w5"><span class="num">05</span>Scroll Journey</button>
    <button class="tab" role="tab" aria-selected="false" data-wire="w6"><span class="num">06</span>Minimalist Surf</button>
  </div>

  <div id="wire-slot"></div>
</div>

<!-- ============ TWEAKS ============ -->
<button id="tweaks-fab" class="btn solid" style="position:fixed;bottom:18px;right:18px;z-index:49;display:none;">Tweaks</button>
<div class="tweaks" id="tweaks">
  <h5>Tweaks
    <button class="btn sm" id="tweaks-close" style="cursor:pointer">×</button>
  </h5>
  <label>Detail level
    <select id="t-detail">
      <option value="sketchy">Sketchy (default)</option>
      <option value="clean">Cleaner lines</option>
      <option value="sparse">Sparse / minimal</option>
    </select>
  </label>
  <label>Beach intensity
    <select id="t-beach">
      <option value="bold" selected>Bold motifs</option>
      <option value="medium">Medium</option>
      <option value="subtle">Subtle</option>
    </select>
  </label>
  <label>Accent
    <select id="t-accent">
      <option value="ocean" selected>Ocean blue</option>
      <option value="sun">Sun / terracotta</option>
      <option value="both">Ocean + sun</option>
    </select>
  </label>
  <label>Language preview
    <select id="t-lang">
      <option value="bi" selected>Bilingual (EN shown, PT toggle)</option>
      <option value="pt">Portuguese</option>
      <option value="en">English</option>
    </select>
  </label>
  <div class="row" style="margin-top:6px">
    <span class="mono" style="color:var(--ink-3)">wireframe</span>
    <select id="t-jump" style="flex:1">
      <option value="w1">01 · Classic Plus</option>
      <option value="w2">02 · Sticky Coastline</option>
      <option value="w3">03 · Multi-route SPA</option>
      <option value="w4">04 · Bento Beach</option>
      <option value="w5">05 · Scroll Journey</option>
      <option value="w6">06 · Minimalist Surf</option>
    </select>
  </div>
</div>

<!-- Wires are rendered by wires.js -->
<script src="wires.js"></script>
<script>
  // Tab switching
  const tabs = document.querySelectorAll('.tab');
  function setActive(id) {
    tabs.forEach(t => t.setAttribute('aria-selected', t.dataset.wire === id ? 'true' : 'false'));
    document.querySelectorAll('.wire').forEach(w => w.classList.toggle('active', w.id === id));
    localStorage.setItem('wire', id);
    const jump = document.getElementById('t-jump');
    if (jump) jump.value = id;
  }
  tabs.forEach(t => t.addEventListener('click', () => setActive(t.dataset.wire)));
  const saved = localStorage.getItem('wire') || 'w1';
  setActive(saved);

  // Tweaks wiring
  const fab = document.getElementById('tweaks-fab');
  const panel = document.getElementById('tweaks');
  const closeBtn = document.getElementById('tweaks-close');
  function showTweaks(show) {
    panel.classList.toggle('open', show);
    fab.style.display = show ? 'none' : 'inline-block';
  }
  fab.addEventListener('click', () => showTweaks(true));
  closeBtn.addEventListener('click', () => showTweaks(false));

  // Listen for host toggle
  let editModeOn = false;
  window.addEventListener('message', (e) => {
    const d = e.data || {};
    if (d.type === '__activate_edit_mode') { editModeOn = true; showTweaks(true); }
    if (d.type === '__deactivate_edit_mode') { editModeOn = false; showTweaks(false); }
  });
  // Announce after listener is live
  try { window.parent.postMessage({type: '__edit_mode_available'}, '*'); } catch(e) {}

  // Tweak handlers
  const root = document.documentElement;
  function applyAccent(v) {
    if (v === 'sun')   { root.style.setProperty('--ocean', '#d98a3d'); root.style.setProperty('--ocean-soft', '#f5d7b3'); }
    else if (v === 'both') { /* keep default ocean, let sun class handle */ root.style.setProperty('--ocean', '#2b6a8a'); root.style.setProperty('--ocean-soft', '#9ec2d4'); }
    else { root.style.setProperty('--ocean', '#2b6a8a'); root.style.setProperty('--ocean-soft', '#9ec2d4'); }
  }
  function applyDetail(v) {
    document.body.classList.remove('clean', 'sparse');
    if (v === 'clean') document.body.classList.add('clean');
    if (v === 'sparse') document.body.classList.add('sparse');
  }
  function applyBeach(v) {
    document.body.dataset.beach = v;
  }
  function applyLang(v) {
    document.body.dataset.lang = v;
  }
  document.getElementById('t-accent').addEventListener('change', e => applyAccent(e.target.value));
  document.getElementById('t-detail').addEventListener('change', e => applyDetail(e.target.value));
  document.getElementById('t-beach').addEventListener('change', e => applyBeach(e.target.value));
  document.getElementById('t-lang').addEventListener('change', e => applyLang(e.target.value));
  document.getElementById('t-jump').addEventListener('change', e => setActive(e.target.value));
</script>

<style>
  /* Tweak styles */
  body.clean .box { border-width: 1.5px; }
  body.clean .canvas { box-shadow: none; }
  body.clean .canvas::before { display: none; }
  body.sparse .img-ph { background: var(--paper-2); }
  body.sparse .lorem { display: none; }
  body.sparse .note { display: none; }
  body[data-beach="subtle"] .wave { display: none; }
  body[data-beach="subtle"] .hero-photo::after { background: rgba(0,0,0,.2); }
</style>

</body>
</html>
